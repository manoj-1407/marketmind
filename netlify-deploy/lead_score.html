<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Qualifier – MarketMind - Aikta</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/favicon.png">


  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/main.js" defer></script>
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo-section">
        <div class="logo-icon">M</div>
        <div class="logo-text">MarketMind - Aikta</div>
      </div>
      <nav>
        <ul class="nav-menu">
          <li><a href="/" class="nav-link">Home</a></li>
          <li><a href="/campaign" class="nav-link">Campaign</a></li>
          <li><a href="/pitch" class="nav-link">Pitch</a></li>
          <li><a href="/lead-score" class="nav-link active">Lead Score</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          🌙
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="page-header">
      <h1 class="page-title">Lead Qualifier</h1>
      <p class="page-subtitle">
        Identify and prioritize high-value leads with AI-powered scoring and qualification analysis.
      </p>
    </section>

    <div class="two-column-layout">
      <!-- Form -->
      <form id="leadScoreForm" class="form-card">
        <div class="form-group">
          <label for="nameInput">Lead Name</label>
          <input
            id="nameInput"
            type="text"
            placeholder="e.g., Sarah Johnson"
            required
          />
        </div>

        <div class="form-group">
          <label for="budgetInput">Budget Information</label>
          <textarea
            id="budgetInput"
            placeholder="e.g., $150,000 annual budget, can approve deals up to $50,000"
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="needInput">Business Need</label>
          <textarea
            id="needInput"
            placeholder="e.g., Improve customer retention by 20%, reduce churn"
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="urgencyInput">Urgency Level</label>
          <textarea
            id="urgencyInput"
            placeholder="e.g., Board requested solution by end of Q3, high priority"
            required
          ></textarea>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-chart-line"></i>
            Score Lead
          </button>
          <button
            type="button"
            class="btn btn-secondary"
            onclick="clearForm()"
          >
            Clear
          </button>
        </div>
      </form>
<div class="score-card">
  <div class="score-value" id="scoreValue">—</div>
  <div class="score-label" id="scoreLabel">No score yet</div>
  <div class="score-gauge">
    <div class="score-gauge-fill"></div>
  </div>
</div>

      <!-- Output -->
      <section id="outputSection" class="output-section hidden">
        <div class="output-header">
          <h3>Lead Qualification Analysis</h3>
          <div class="output-actions">
            <button
              type="button"
              class="btn btn-secondary btn-icon"
              onclick="copyOutput()"
            >
              <i class="fas fa-copy"></i>
            </button>
          </div>
        </div>
        <pre id="outputContent" class="output-content"></pre>
      </section>
    </div>
  </main>

  <div class="toast-container"></div>
  <div class="loading-overlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <p class="loading-text">Processing...</p>
    </div>
  </div>
</body>
</html>
