<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Generator - MarketMind Pro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-brand">
            <span class="logo">M</span>
            <span class="brand-name">MarketMind - Aikta</span>
        </div>
        <div class="nav-menu">
            <a href="/">🏠 Home</a>
            <a href="/campaign">📢 Campaign</a>
            <a href="/pitch" class="active">💼 Pitch</a>
            <a href="/lead-score">🎯 Lead Score</a>
        </div>
        <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>

    <div class="container">
        <header class="page-header">
            <h1>💼 AI Pitch Deck Generator</h1>
            <p>Create investor-ready pitch decks with professional structure and compelling narrative</p>
        </header>

        <div class="form-section">
            <form id="pitchForm">
                <!-- Basic Info -->
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="pitchProductInput">Company / Product Name *</label>
                        <input type="text" id="pitchProductInput" placeholder="e.g., TechFlow AI" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="customerInput">Target Customer *</label>
                        <input type="text" id="customerInput" placeholder="e.g., Enterprise HR departments with 500+ employees" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="problemInput">Problem Statement *</label>
                        <textarea id="problemInput" rows="3" placeholder="What critical problem does your product solve?" required></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label for="solutionInput">Your Solution *</label>
                        <textarea id="solutionInput" rows="3" placeholder="How does your product solve this problem?" required></textarea>
                    </div>
                </div>

                <!-- Advanced Toggle -->
                <div class="advanced-toggle">
                    <button type="button" id="pitchAdvancedToggle" class="btn-secondary">
                        ⚙️ Show Advanced Options
                    </button>
                </div>

                <!-- Advanced Options -->
                <div id="pitchAdvancedOptions" class="advanced-panel" style="display: none;">
                    <h3>Funding Details</h3>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fundingStageInput">Funding Stage</label>
                            <select id="fundingStageInput">
                                <option value="pre-seed">Pre-Seed</option>
                                <option value="seed">Seed</option>
                                <option value="series-a">Series A</option>
                                <option value="series-b">Series B</option>
                                <option value="series-c">Series C+</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="amountSeekingInput">Amount Seeking (USD)</label>
                            <select id="amountSeekingInput">
                                <option value="">Not specified</option>
                                <option value="50000-250000">$50K - $250K</option>
                                <option value="250000-500000">$250K - $500K</option>
                                <option value="500000-1000000">$500K - $1M</option>
                                <option value="1000000-5000000">$1M - $5M</option>
                                <option value="5000000-10000000">$5M - $10M</option>
                                <option value="10000000+">$10M+</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="valuationInput">Pre-money Valuation (USD)</label>
                            <input type="text" id="valuationInput" placeholder="e.g., $5M">
                        </div>

                        <div class="form-group">
                            <label for="teamSizeInput">Team Size</label>
                            <input type="number" id="teamSizeInput" placeholder="e.g., 12" min="1">
                        </div>
                    </div>

                    <h3>Traction Metrics</h3>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="revenueInput">Monthly Revenue (MRR)</label>
                            <input type="text" id="revenueInput" placeholder="e.g., $50K">
                        </div>

                        <div class="form-group">
                            <label for="customersInput">Total Customers</label>
                            <input type="number" id="customersInput" placeholder="e.g., 150" min="0">
                        </div>

                        <div class="form-group">
                            <label for="growthRateInput">Monthly Growth Rate (%)</label>
                            <input type="number" id="growthRateInput" placeholder="e.g., 25" min="0" max="1000">
                        </div>

                        <div class="form-group">
                            <label for="burnRateInput">Monthly Burn Rate</label>
                            <input type="text" id="burnRateInput" placeholder="e.g., $30K">
                        </div>
                    </div>

                    <h3>Market & Competition</h3>
                    
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="marketSizeInput">Total Addressable Market (TAM)</label>
                            <input type="text" id="marketSizeInput" placeholder="e.g., $50B">
                        </div>

                        <div class="form-group full-width">
                            <label for="competitorsInput">Key Competitors (comma-separated)</label>
                            <input type="text" id="competitorsInput" placeholder="e.g., Competitor A, Competitor B, Competitor C">
                        </div>

                        <div class="form-group full-width">
                            <label for="advantageInput">Competitive Advantage</label>
                            <textarea id="advantageInput" rows="2" placeholder="What gives you an unfair advantage?"></textarea>
                        </div>
                    </div>

                    <h3>Business Model</h3>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="businessModelInput">Revenue Model</label>
                            <select id="businessModelInput">
                                <option value="subscription">Subscription (SaaS)</option>
                                <option value="transaction">Transaction Fee</option>
                                <option value="marketplace">Marketplace</option>
                                <option value="advertising">Advertising</option>
                                <option value="licensing">Licensing</option>
                                <option value="freemium">Freemium</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="pricingInput">Pricing (per month)</label>
                            <input type="text" id="pricingInput" placeholder="e.g., $99-$499">
                        </div>
                    </div>

                    <h3>Pitch Options</h3>
                    
                    <label class="platform-checkbox">
                        <input type="checkbox" id="includeFinancialsCheck" checked>
                        <span>Include detailed financial projections</span>
                    </label>

                    <label class="platform-checkbox">
                        <input type="checkbox" id="includeRoadmapCheck">
                        <span>Include 12-month product roadmap</span>
                    </label>

                    <label class="platform-checkbox">
                        <input type="checkbox" id="includeTeamCheck">
                        <span>Include team background section</span>
                    </label>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary" id="pitchGenerateBtn">
                        ✨ Generate Pitch Deck
                    </button>
                    <button type="button" class="btn-secondary" onclick="clearForm()">
                        🔄 Clear
                    </button>
                </div>
            </form>
        </div>

        <!-- Output Section -->
        <div id="outputSection" class="output-section hidden">
            <div class="output-header">
                <h2>📊 Your Pitch Deck</h2>
                <div class="output-actions">
                    <button onclick="copyOutput()" class="btn-icon" title="Copy to clipboard">📋</button>
                    <button onclick="downloadPDF()" class="btn-icon" title="Download PDF">📄</button>
                    <button onclick="exportPowerPoint()" class="btn-icon" title="Export outline">📑</button>
                </div>
            </div>
            <div id="outputContent" class="output-content"></div>
            <div class="output-footer">
                <span id="wordCount">0 words</span>
                <span id="slideCount">0 slides</span>
            </div>
        </div>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
